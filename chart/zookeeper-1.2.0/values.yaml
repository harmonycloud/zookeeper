args:
  # initLimit: 10
  # tickTime: 2000
  # syncLimit: 2
  # quorumListenOnAllIPs: false
  autoPurgeSnapRetainCount: 20
  autoPurgePurgeInterval: 48
  skipACL: "yes"

replicas: 3

#支持版本：3.7.1
version: 3.7.1

image:
  repository: harbor.middleware.com/middleware
  tag_36: 3.6.2-2
  tag_37: 3.7.1-2
  testImageTag: v0.3
  pullPolicy: IfNotPresent

domainName:
labels: {}
ports: []
kubernetesClusterDomain: "cluster.local"

pod:
  labels:
    middleware: zookeeper
  # nodeSelector: {}
  # affinity: {}
  resources:
    requests:
      cpu: 1
      memory: "2048M"
    limits:
      cpu: 2
      memory: "4096M"
  # tolerations: []
  env:
    - name: TZ
      value: Asia/Shanghai
  # annotations: {}
  # securityContext: {}
  # terminationGracePeriodSeconds: 30
  serviceAccountName: zookeeper

## configure the storage type
## accepted values : persistence/ephemeral
## default option is persistence
storageType: persistence

nodeAffinity: {}

#取值[hard|soft] hard:强制反亲和 soft:非强制反亲和
podAntiAffinity: "soft"

podAntiAffinityTopologKey: "kubernetes.io/hostname"

persistence:
  # storageClassName: default
  ## specifying reclaim policy for PersistentVolumes
  ## accepted values - Delete / Retain
  reclaimPolicy: Retain
  volumeSize: 1Gi

ephemeral:
  emptydirvolumesource:
    ## specifying Medium for emptydirvolumesource
    ## accepted values - ""/Memory
    medium: ""
    sizeLimit: 1Gi

containers: []
volumes: []

additionArgs: {}
#  standaloneEnabled: "false"
