capabilities:
  - basic
  - high
  - ingress
  - monitoring
  - log
  - config
  - alert
  - backup
questions:
  - variable: nodeAffinity
    description: "主机亲和"
    label: "主机亲和"
    default: false
    type: nodeAffinity
    group: "调度策略"
  - variable: replicas
    default: 3
    label: 副本数
    pattern: ^[0-9]$
    detail: true
    message: "请输入大于0小于9的数字"
    type: int
    group: "Zookeeper 配置"
  - variable: image.repository
    default: "middleware.harmonycloud.cn:38080/middleware"
    label: 镜像仓库
    detail: true
    type: string
    required: true
    group: "Zookeeper 配置"
  - variable: pod.resources.requests.cpu
    default: "200m"
    pattern: ^[1-9]m$|^[1-9][0-9]m$|^[1-9][0-9][0-9]m$|^10000m$
    message: "请输入单位为m的1-1000之间的字符串"
    label: CPU Requests
    group: "规格配置"
    type: string
    detail: true
    required: true
  - variable: pod.resources.requests.memory
    default: "512M"
    label: Memory Requests
    pattern: ^[1-9][0-9][0-9]M$|^[1-9][0-9][0-9][0-9]M$|^10000M$
    message: "请输入单位为M的1000-10000之间的字符串"
    detail: true
    type: string
    group: "规格配置"
    required: true
  - variable: pod.resources.limits.cpu
    default: "1000m"
    pattern: ^[1-9]m$|^[1-9][0-9]m$|^[1-9][0-9][0-9]m$|^10000m$
    label: CPU Limits
    group: "规格配置"
    type: string
    required: true
  - variable: pod.resources.limits.memory
    default: "2048M"
    pattern: ^[1-9][0-9][0-9]M$|^[1-9][0-9][0-9][0-9]M$|^10000M$
    label: Memory Limits
    type: string
    group: "规格配置"
    required: true
  - variable: persistence.storageClassName
    default: ""
    label: 存储类型
    type: storageclass
    required: true
    group: "规格配置"
  - variable: persistence.volumeSize
    default: "1Gi"
    label: 存储大小
    type: string
    required: true
    group: "规格配置"
