apiVersion: v1
kind: Pod
metadata:
  name: {{ include "zookeeper.fullname" . }}-test
  annotations:
    "helm.sh/hook": test-success
  labels:
    helm-test: zookeeper
spec:
  containers:
    - image: {{ .Values.image.repository }}/operator-test-framework:{{ .Values.image.testImageTag}}
      name: {{ include "zookeeper.fullname" . }}-test
      # args: ["-p","name={{ include "zookeeper.fullname" . }}","-v","2"]
      args: ["-p","name={{ include "zookeeper.fullname" . }}"]
      imagePullPolicy: {{.Values.image.pullPolicy}}
      volumeMounts:
        - name: config-volume
          mountPath: /conf
  volumes:
    - name: config-volume
      configMap:
        name: {{ include "zookeeper.fullname" . }}-test-config
  serviceAccount: {{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
  serviceAccountName: {{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
  restartPolicy: Never
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Namespace }}-{{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
rules:
  - apiGroups:
      - "*"
    resources:
      - pods
      - zookeeperclusters
    verbs:
      - get
      - list
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Namespace }}-{{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Namespace }}-{{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
subjects:
  - kind: ServiceAccount
    name: {{ include "zookeeper.fullname" . }}-charts-tests-zookeeper
    namespace: {{ .Release.Namespace }}
