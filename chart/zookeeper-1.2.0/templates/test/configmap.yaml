apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zookeeper.fullname" . }}-test-config
data:
  job.properties: |
    name: "zookeeper-test"
    parameter:
    - key: GetPhase
      value: "kubectl get #{kind} #{name} -o=jsonpath='{.status.readyReplicas}'"
    - key: GetRevision
      value: "kubectl get #{kind} #{name} -o=jsonpath='{.metadata.resourceVersion}'"
    - key: kind
      value: zookeeperclusters
    jobs:
      # 初始化状态检查
      - name: "Init"
        timeout: 5m
        interval: 5s
        verificate:
          - cmd: #{GetPhase}
            value: "3"





