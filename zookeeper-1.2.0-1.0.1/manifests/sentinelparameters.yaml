middlewareDefinition: zookeeper-standalone
values:
  - name: zookeeper
    path: spec.parameters.config
    parameters:
      - appendonly:
          - name: default
            value: 'no'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "Append to the AOF file instead of overwriting it, default is no"
      - lua-time-limit:
          - name: default
            value: 5000
          - name: isReboot
            value: n
          - name: range
            value: [0-600000]
          - name: describe
            value: "Max execution time of a Lua script in milliseconds. Zero or negative means unlimited. Max value is 600000 (10 minutes). Default is 5000 (5 seconds)."
      - slowlog-log-slower-than:
          - name: default
            value: 10000
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Time in microseconds needed for a command to be considered slow. Max value is 100000 (100 milliseconds). Default is 10000 (10 milliseconds)."
      - maxmemory:
          - name: default
            value: LEAST(DBInstanceMemory*4/5, 25G)
          - name: isReboot
            value: n
          - name: range
            value: "[0-25G]"
          - name: describe
            value: "Max memory to use for the Redis server."
      - zset-max-ziplist-entries:
          - name: default
            value: 128
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Max number of entries for a ziplist. Default is 128. If you are using Redis version 7 or above, this parameter is equivalent to zset-max-listpack-entries."
      - save:
          - name: default
            value: "60 10000"
          - name: isReboot
            value: n
          - name: range
            value: "save <seconds> <changes>"
          - name: describe
            value: "Save the DB on disk. Will save the DB if both the given number of seconds and the given, number of write operations against the DB occurred. save <seconds> <changes>. Default is 60 10000."
      - tcp-backlog:
          - name: default
            value: 511
          - name: isReboot
            value: y
          - name: range
            value: [0-100000]
          - name: describe
            value: "TCP listen() backlog. In high requests-per-second environments you need an high backlog in order to avoid slow clients connections issues. Note that the Linux kernel will silently truncate it to the value of /proc/sys/net/core/somaxconn so make sure to raise both the value of tcp-backlog and somaxconn. Default is 511."
      - tcp-keepalive:
          - name: default
            value: 60
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The TCP keepalive interval in seconds. Set to 0 to disable it. Default is 60."
      - stop-writes-on-bgsave-error:
          - name: default
            value: 'no'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will stop accepting writes if RDB snapshots are enabled (at least one save point) and the latest background save failed. This will make the user aware (in a hard way) that data is not persisting on disk properly, otherwise chances are that no one will notice and some disaster will happen. Default is no."
      - slave-serve-stale-data:
          - name: default
            value: 'yes'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, when a slave loses its connection with the master, or when the replication is still in progress, it will reply to client requests with the latest data it has, otherwise if this option is set to no the server will reply with an error 'SYNC with master in progress' and a client will be able to understand that the operation can't be performed now and will retry later. Default is yes."
      - timeout:
          - name: default
            value: 300
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Close the connection after a client is idle for N seconds (0 to disable). Default is 300."
      - activerehashing:
          - name: default
            value: 'yes'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "Enables or disables active rehashing. If you have automatic rehashing enabled this will cause more rehashing steps to be performed, in order to try to reclaim memory. Default is yes."
      - hz:
          - name: default
            value: 10
          - name: isReboot
            value: n
          - name: range
            value: [1-500]
          - name: describe
            value: "The serverCron() calls frequency in hertz. Redis will check for events every 1000/serverCronFrequency milliseconds. Default is 10."
      - cluster-node-timeout:
          - name: default
            value: 15000
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The node timeout is the amount of time a node must be unreachable for it to be considered in failure state. Default is 15000."
      - repl-timeout:
          - name: default
            value: 60
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The timeout for replication between the primary and secondary nodes."
      - repl-backlog-size:
          - name: default
            value: "256mb"
          - name: isReboot
            value: n
          - name: range
            value: [1mb-10gb]
          - name: describe
            value: "The replication backlog size. The backlog is a buffer that accumulates slave data when slaves are disconnected for some time. The bigger the replication backlog, the longer the time the slaves can be disconnected and later be able to completely synchronize with the master. Default is 256mb."
      - repl-diskless-sync:
          - name: default
            value: "no"
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will try to use diskless replication with slaves. If diskless replication is not possible, Redis will fall back to the disk-based approach. Default is no."
      - repl-diskless-sync-delay:
          - name: default
            value: 5
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The delay that the server waits before starting a diskless replication synchronization with a slave. This is useful to let slaves start their replication subsystems before the master starts a full resynchronization with them. Default is 5."
      - hash-max-ziplist-value:
          - name: default
            value: 64
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Max value length for a ziplist. Default is 64. If you are using Redis version 7 or above, this parameter is equivalent to hash-max-listpack-value."
      - databases:
          - name: default
            value: 16
          - name: isReboot
            value: y
          - name: range
            value: [0-100000]
          - name: describe
            value: "The number of databases. Default is 16."
      - latency-monitor-threshold:
          - name: default
            value: 0
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The latency monitor reports with millisecond resolution, the slowest commands. This is the amount of milliseconds that a command must execute in order to be reported. Default is 0."
      - hash-max-ziplist-entries:
          - name: default
            value: 512
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Max number of entries for a ziplist. Default is 512. If you are using Redis version 7 or above, this parameter is equivalent to hash-max-listpack-entries."
      - rdbchecksum:
          - name: default
            value: 'yes'
          - name: isReboot
            value: y
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will check the RDB file checksum on startup. Default is yes."
      - cluster-require-full-coverage:
          - name: default
            value: 'no'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, all the slots must be covered by at least one master node. Default is no."
      - client-output-buffer-limit:
          - name: default
            value: "replica maxmemory maxmemory/4 120"
          - name: isReboot
            value: n
          - name: range
            value: "client-output-buffer-limit <class> <hard limit> <soft limit> <soft seconds>"
          - name: describe
            value: "This directive configures the Redis server's behavior when the client output buffers are full. The client buffers can be found in the client structure, and are composed of two different buffers, one for the query buffer (used to accumulate the client query) and one for the output buffer (used to accumulate the reply to the client). The client buffers are limited to a fixed amount of memory, so when a client reaches the specified limit, Redis can close the connection or, if the soft limit is reached, just reply with an error, or a partial reply, and let the client to try again later, when the query buffer will be empty enough for new data to be read. The limit can be specified in absolute bytes, or as a percentage of the total system memory, by using the suffix '%%'. The default configuration is: pubsub 32mb 8mb 60"
      - maxclients:
          - name: default
            value: 15000
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The max number of connected clients at the same time. Default is 15000."
      - slave-priority:
          - name: default
            value: 100
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "A slave with a lower priority number is considered for failover before one with a greater priority. Default is 100."
      - hll-sparse-max-bytes:
          - name: default
            value: 3000
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The maximum number of bytes to use for the sparse representation of the HyperLogLog. Default is 3000."
      - repl-disable-tcp-nodelay:
          - name: default
            value: 'no'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, slaves will not use the TCP_NODELAY option when talking to the master. Default is no."
      - slowlog-max-len:
          - name: default
            value: 1000
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The maximum number of log entries for the slow log. Default is 1000."
      - loglevel:
          - name: default
            value: "notice"
          - name: isReboot
            value: n
          - name: range
            value: [debug|verbose|notice|warning]
          - name: describe
            value: "The server verbosity level. Default is notice."
      - set-max-intset-entries:
          - name: default
            value: 512
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Max number of entries for a set intset. Default is 512."
      - zset-max-ziplist-value:
          - name: default
            value: 64
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "Max value length for a zset ziplist. Default is 64. If you are using Redis version 7 or above, this parameter is equivalent to zset-max-listpack-value."
      - rdbcompression:
          - name: default
            value: 'yes'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will compress string objects using LZF when dumping. Default is yes."
      - maxmemory-policy:
          - name: default
            value: "volatile-lru"
          - name: isReboot
            value: n
          - name: range
            value: [noeviction|allkeys-lru|allkeys-random|volatile-lru|volatile-random|volatile-ttl]
          - name: describe
            value: "The policy to apply when Redis runs out of memory. Default is volatile-lru."
      - cluster-replica-validity-factor:
          - name: default
            value: 0
          - name: isReboot
            value: n
          - name: range
            value: [0-100000]
          - name: describe
            value: "The replica validity factor is used to determine if a replica is no longer valid as a failover slave. Default is 0."
      - lazyfree-lazy-expire:
          - name: default
            value: 'yes'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will lazily free the expire set of keys in background when the server is idle. Default is yes."
      - lazyfree-lazy-server-del:
          - name: default
            value: 'yes'
          - name: isReboot
            value: n
          - name: range
            value: [no|yes]
          - name: describe
            value: "If true, Redis will lazily free the list of keys in background when the server is idle. Default is yes."